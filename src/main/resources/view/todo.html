<div class="todo">
  <h2 class="todo-title">My Todos</h2>

  <ul class="todo-list">
    {% for todo in todos %}
    <li class="todo-item">
      <span class="todo-text">{{todo}}</span>
      <form action="/todo/delete" method="post" class="todo-delete-form">
        <input type="hidden" name="todo" value="{{ todo }}">
        <button class="todo-delete">Delete</button>
      </form>
    </li>
    {% empty %}
    <li class="todo-empty">No todos yet. Add one below.</li>
    {% endfor %}
  </ul>

  <form class="todo-form" method="post" action="/todo">
    <input type="text" name="todo" placeholder="Add a new todo..." class="todo-input">
    <button class="btn btn-primary">Add</button>
  </form>
</div>

<style>
  .todo { max-width: 480px; }

  .todo-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-heading);
    margin-bottom: 1.25rem;
  }

  .todo-list {
    list-style: none;
    padding: 0;
    margin: 0 0 1.5rem;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .65rem 0;
    border-bottom: 1px solid var(--border-light);
  }

  .todo-item:last-child {
    border-bottom: none;
  }

  .todo-text {
    flex: 1;
    font-size: .9rem;
    color: var(--text);
  }

  .todo-empty {
    font-size: .85rem;
    color: var(--text-secondary);
    padding: .65rem 0;
  }

  .todo-delete-form { margin: 0; }

  .todo-delete {
    background: none;
    border: 1px solid #e8ecf0;
    color: #656d76;
    padding: .3rem .65rem;
    border-radius: 6px;
    font-size: .75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }

  .todo-delete:hover {
    border-color: #cf222e;
    color: #cf222e;
  }

  .todo-form {
    display: flex;
    gap: .5rem;
  }

  .todo-input {
    flex: 1;
    padding: .55rem .75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .875rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
  }

  .todo-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light);
  }

  .todo-input::placeholder {
    color: var(--text-secondary);
  }
</style>
