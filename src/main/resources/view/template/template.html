<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shock Framework</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Noto Sans, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1f2328;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .layout-header {
            border-bottom: 1px solid #e8ecf0;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .layout-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0d1117;
            margin-bottom: .25rem;
        }

        .layout-header p {
            font-size: .875rem;
            color: #656d76;
        }

        .layout-main {
            flex: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        #content {
            font-size: 1rem;
            line-height: 1.7;
            color: #1f2328;
        }

        .layout-footer {
            border-top: 1px solid #e8ecf0;
            padding: 1.5rem 2rem;
            text-align: center;
            font-size: .82rem;
            color: #656d76;
        }
    </style>
</head>
<body>
    <header class="layout-header">
        <h1>Shock Framework</h1>
        <p>A Modern Java Web Framework</p>
    </header>

    <main class="layout-main">
        <div id="content">
            {{content}}
        </div>
    </main>

    <footer class="layout-footer">
        &copy; {{year}} Shock Framework. All rights reserved.
    </footer>
</body>
</html>
