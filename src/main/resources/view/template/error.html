<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shock - Development Error</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Noto Sans, Helvetica, Arial, sans-serif;
            background: #f6f8fa;
            color: #1f2328;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .error-container {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #cf222e;
            margin-bottom: .5rem;
            letter-spacing: -.02em;
        }

        .error-subtitle {
            font-size: .875rem;
            color: #656d76;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e8ecf0;
            padding-bottom: 1rem;
        }

        .error-message {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            font-size: .9rem;
            color: #1f2328;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .stack-trace {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            min-height: 200px;
        }

        .stack-trace-title {
            font-size: .8rem;
            font-weight: 600;
            color: #656d76;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: .75rem;
        }

        .stack-trace pre {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            font-size: .82rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            color: #656d76;
        }

        .error-actions {
            display: flex;
            gap: .75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: .5rem 1rem;
            border-radius: 6px;
            font-size: .85rem;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid transparent;
            transition: all .15s;
        }

        .btn:hover { text-decoration: none; }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            color: #fff;
        }

        .btn-secondary {
            background: #ffffff;
            color: #1f2328;
            border-color: #d0d7de;
        }

        .btn-secondary:hover {
            background: #f6f8fa;
            border-color: #656d76;
        }

        .error-divider {
            height: 1px;
            background: #e8ecf0;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-title">Shock - Development Error</h1>
        <p class="error-subtitle">An unexpected error occurred while processing your request.</p>

        <p class="error-message">{{content}}</p>

        <div class="stack-trace">
            <h2 class="stack-trace-title">Stack Trace</h2>
            <pre>{{stack}}</pre>
        </div>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">Back to homepage</a>
            <a href="mailto:support@shock.com" class="btn btn-secondary">Report issue</a>
        </div>

        <div class="error-divider"></div>

        <p style="font-size:.82rem;color:#656d76;">
            If you believe this is an error, please contact <a href="mailto:support@shock.com" style="color:#2563eb;text-decoration:none;">support@shock.com</a>
        </p>
    </div>
</body>
</html>
